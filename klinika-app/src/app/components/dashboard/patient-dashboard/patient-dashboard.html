<div>
  <h2>Patient Dashboard</h2>
  <h2>{{userName}}</h2>
  <button (click)="logout()">Odjavi se</button>
  <h3>Moji termini</h3>
  <ul>
    <li *ngFor="let a of appointments">
      {{a.dateTime | date:'dd.mm.yyyy HH:mm'}} - {{a.reason}} - {{a.status}} - Dr. {{a.doctor?.firstName}} {{a.doctor?.lastName}}
    </li>
  </ul>
</div>
